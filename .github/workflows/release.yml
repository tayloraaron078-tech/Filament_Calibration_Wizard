name: Release

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build:
    strategy:
      fail-fast: false
      matrix:
        include:
          - platform: macos-latest
            artifact-name: perfectfit-macos
            args: '--target universal-apple-darwin --bundles dmg'
          - platform: ubuntu-22.04
            args: '--bundles deb,appimage'
          - platform: windows-latest
            artifact-name: perfectfit-windows
            args: '--bundles nsis'
    runs-on: ${{ matrix.platform }}
    steps:
      - uses: actions/checkout@v5

      - name: Setup Node.js
        uses: actions/setup-node@v5
        with:
          node-version: lts/*
          cache: npm

      - name: Install Linux build dependencies
        if: matrix.platform == 'ubuntu-22.04'
        run: |
          sudo apt-get update
          sudo apt-get install -y libwebkit2gtk-4.1-dev libappindicator3-dev librsvg2-dev patchelf xdg-utils

      - name: Install Rust stable
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.platform == 'macos-latest' && 'aarch64-apple-darwin,x86_64-apple-darwin' || '' }}

      - name: Cache Rust build artifacts
        uses: swatinem/rust-cache@v2
        with:
          workspaces: './src-tauri -> target'

      - name: Install frontend dependencies
        run: npm ci

      - name: Validate printer database is up to date
        run: npm run validate:printers

      - uses: tauri-apps/tauri-action@v1
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          tagName: ${{ github.ref_name }}
          releaseName: 'PerfectFit ${{ github.ref_name }}'
          releaseBody: |
            # PerfectFit 1.3.0

            ## Highlights

            - **Printer specification database:** pick your printer from 379 known models across 64 manufacturers when adding a printer, and the machine specs — temperature limits, extruder type, max volumetric flow, build volume, supported nozzle sizes, heated chamber, firmware and more — fill in automatically. A searchable, manufacturer-grouped combobox handles the large list, and every value stays editable for modified or custom hardware.
            - **“My printer is not listed”** still gives you full manual entry — nothing about the previous workflow was removed. Manually configured printers are clearly labelled.
            - **Smarter safety guidance:** the database’s heated-chamber and supported-nozzle data drive extra warnings (e.g. enclosure materials on a printer with no heated chamber), on top of the existing max-temperature and max-flow guardrails.
            - **Maintainable data pipeline:** the database is edited in `Printer_Database/Printer_Database.xlsx`, regenerated with `npm run generate:printers`, and committed as `src/data/printers.json`. See “Updating the Printer Database” in the README.
            - **Local-time backups:** slicer preset backup timestamps in Settings now display in your PC’s local time instead of UTC.

            Existing saved printers and projects continue to work unchanged; the printer profile schema change is additive, and older backups migrate on import.

            ## Downloads

            - Windows: NSIS installer (`.exe`).
            - macOS: universal Apple Silicon + Intel disk image (`.dmg`).
            - Linux: Debian package (`.deb`) plus portable AppImage (`.AppImage`).
          releaseDraft: true
          prerelease: false
          args: ${{ matrix.args }}
