name: "Feature request"
description: "Suggest an improvement or new capability for PerfectFit"
title: "[Feature]: "
labels:
  - "enhancement"
body:
  - type: markdown
    attributes:
      value: |
        Thanks for suggesting an improvement!

        PerfectFit is focused on guiding users through filament calibration in Orca Slicer and Bambu Studio. Ideas that improve that workflow are especially welcome.

  - type: checkboxes
    id: preliminary-checks
    attributes:
      label: "Before submitting"
      options:
        - label: "I searched existing issues and did not find the same suggestion."
          required: true
        - label: "This request relates to filament calibration or the PerfectFit workflow."
          required: true

  - type: textarea
    id: problem
    attributes:
      label: "What problem would this solve?"
      description: "Describe the missing capability, difficulty, or recurring frustration."
      placeholder: "Explain the problem before describing your proposed solution."
    validations:
      required: true

  - type: textarea
    id: proposed-solution
    attributes:
      label: "Proposed solution"
      description: "Describe how you would like the feature to work."
      placeholder: "Walk us through the ideal behavior."
    validations:
      required: true

  - type: dropdown
    id: application-area
    attributes:
      label: "Area of the application"
      options:
        - "General workflow"
        - "Orca Slicer instructions"
        - "Bambu Studio instructions"
        - "Pressure Advance"
        - "Flow Rate"
        - "Retraction"
        - "Maximum Volumetric Speed"
        - "Filament profiles or profile installation"
        - "Coach Mode"
        - "Results or record keeping"
        - "User interface or accessibility"
        - "Installation or updates"
        - "Other"
    validations:
      required: true

  - type: dropdown
    id: target-users
    attributes:
      label: "Who would benefit most?"
      options:
        - "Beginners"
        - "Advanced users"
        - "Users of Orca Slicer"
        - "Users of Bambu Studio"
        - "Users of a specific printer or printer type"
        - "Most PerfectFit users"
        - "Other"
    validations:
      required: true

  - type: textarea
    id: benefit
    attributes:
      label: "Why would this be useful?"
      description: "Explain how this would improve calibration, reduce confusion, save time, or prevent mistakes."
    validations:
      required: true

  - type: textarea
    id: alternatives
    attributes:
      label: "Alternatives or workarounds"
      description: "Describe any current workaround or other approach you have considered."
    validations:
      required: false

  - type: textarea
    id: examples
    attributes:
      label: "Examples, mockups, or references"
      description: "Add screenshots, sketches, links, or examples that help explain the idea."
    validations:
      required: false

  - type: checkboxes
    id: contribution
    attributes:
      label: "Contribution"
      options:
        - label: "I may be willing to help test this feature."
          required: false
        - label: "I may be willing to help implement this feature."
          required: false
